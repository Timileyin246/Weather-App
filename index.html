<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="font-[poppins] min-h-screen bg-gray-100 flex items-center justify-center py-6 px-4 max-sm:items-start max-sm:pt-10">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-6 mt-6">

        <h1 class="text-3xl font-bold text-blue-600 text-center mb-6">Weather App</h1>

        <div class="flex gap-4 mb-4 justify-center">
            <input id="cityInput" class="flex-1 px-4 py-3 rounded-xl border border-gray-200 text-gray-700 text-sm outline-blue-400" type="text" placeholder="Enter city name"/>
            <button id="searchBtn" class="px-6 py-3 bg-blue-700 hover:bg-blue-600 text-white text-sm font-semibold rounded-xl">Search</button>
        </div>

        <p id="errorMsg" class="hidden text-red-500 text-md text-center mb-3"></p>

        <div id="loader" class="hidden justify-center my-6">
            <div class="w-8 h-8 border-4 border-blue-300 border-t-blue-800 rounded-full animate-spin"></div>
        </div>

        <div id="currentWeather" class="hidden bg-blue-400 rounded-2xl p-5 text-white text-center">
            <h2 id="cityName" class="text-3xl font-bold mb-1"></h2>
            <p id="weatherDesc" class="text-blue-900 text-lg capitalize mb-1"></p>
            <img id="weatherIcon" src="" alt="icon" class="w-20 mx-auto" />
            <p id="temperature" class="text-6xl font-extrabold my-2"></p>
            <div class="flex justify-around mt-3 text-md border-t border-white/50 pt-3">
                <span id="feelsLike" class="text-center"></span>
                <span id="humidity" class="text-center"></span>
                <span id="windSpeed" class="text-center"></span>
            </div>
        </div>
    </div>

    <script src="./scripts.js"></script>
</body>
</html>
